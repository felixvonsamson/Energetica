[tool.ruff]
line-length = 120 # Let's keep this at 120 for now, there are some files that need it
target-version = "py312"
lint.select = [
    "D100",
    "D200",
    "D201",
    "D202",
    "D209",
    # "D213",
    "D400",
    "D415",
    "F401",
    # "TD004", TODOs
    "PIE794",
    "ANN001",
    "ANN201",
    "F404"
]
# select = ["ALL"]
lint.ignore = [
    "D212",
    "ANN401",
    "RET503",
    "DTZ005",
    "COM812",
]

[tool.pyright]
include = ["energetica", "lobby", "tests", "scripts", "main.py", "main_lobby.py"]
pythonVersion = "3.12"
typeCheckingMode = "standard"

[tool.pytest.ini_options]
testpaths = [ "tests" ]
filterwarnings = ["ignore::DeprecationWarning"]
python_files = "tests/**/*.py"
# Exclude the slow, network-dependent external_links tests by default so a bare
# `pytest` matches what CI runs on normal branches and doesn't fail on an offline
# machine. Run them explicitly with `pytest -m external_links`, or the whole suite
# (including them) with `pytest -m ""`. CI runs the full suite on release/* branches.
addopts = ["-m", "not external_links"]
markers = [
    "external_links: tests that make external HTTP requests (slow, network-dependent, run before releases)",
]