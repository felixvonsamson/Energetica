[tool.ruff]
line-length = 120 # Let's keep this at 120 for now, there are some files that need it
target-version = "py312"
select = [
    "D100",
    "D200",
    "D201",
    "D202",
    "D209",
    "D213",
    "D400", 
    "D415", 
    "COM812", 
    "F401", 
    # "TD004", TODOs
    "PIE794", 
    "ANN001", 
    "ANN201", 
    "F404"
]
# select = ["ALL"]
ignore = [
    "D212", 
    "ANN401",
    "RET503",
    "DTZ005",
]

[tool.pytest.ini_options]
testpaths = [ "tests" ]
filterwarnings = ["ignore::DeprecationWarning"]
python_files = "tests/**/*.py"