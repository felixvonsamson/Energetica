name: Energetica CI

on:
  push:
    branches: [main, dev, release/*]
  pull_request:
    branches: [main, dev, release/*]

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: frontend
      - name: Typecheck
        run: bun run typecheck
        working-directory: frontend
      - name: Lint
        run: bun run lint
        working-directory: frontend

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          # Skip slow external link tests on regular branches, include on releases
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            pytest
          else
            pytest -m "not external_links"
          fi
