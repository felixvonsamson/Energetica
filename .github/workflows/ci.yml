name: Energetica CI

on:
  push:
    branches: [main, dev, release/*]
  pull_request:
    branches: [main, dev, release/*]

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: frontend
      - name: Format check
        run: bun run format:check
        working-directory: frontend
      - name: Typecheck
        run: bun run typecheck
        working-directory: frontend
      - name: Lint
        run: bun run lint
        working-directory: frontend
      - name: Guard — no raw-HTML rendering of UGC (ADR-0002, #843)
        run: bun run guard:no-raw-html
        working-directory: frontend

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pyright
        # Point pyright at the interpreter that has the deps installed; bare
        # pyright resolves against its own bundled env and floods reportMissingImports.
        run: pyright --pythonpath "$(which python)"

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          # Skip slow external link tests on regular branches, include on releases
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            pytest
          else
            pytest -m "not external_links"
          fi

  api-types-freshness:
    # Regenerate frontend/src/types/api.generated.ts and fail if it drifts from
    # what's committed. Generation boots the FastAPI app to emit the OpenAPI
    # schema (needs Python + deps) then runs openapi-typescript + prettier (needs bun).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install frontend dependencies
        run: bun install
        working-directory: frontend
      - name: Regenerate API types
        run: bun run generate-types
      - name: Fail on drift
        run: |
          if ! git diff --exit-code frontend/src/types/api.generated.ts; then
            echo "::error::api.generated.ts is stale. Run 'bun run generate-types' and commit the result."
            exit 1
          fi
