# Apache vhost for a single game instance: @INSTANCE@.@DOMAIN@
#
# Rendered by scripts/infra/setup-instance.sh, which substitutes the placeholders
# @INSTANCE@ (kebab-case slug), @PORT@ (uvicorn port), @DOMAIN@ (apex domain).
# ${APACHE_LOG_DIR} is a literal Apache runtime variable — do NOT substitute it.
#
# Apache serves the static app bundle, images, data, service worker and PWA manifest
# directly from disk; only dynamic traffic (/api, /socket.io, /logout) is proxied to
# the per-instance uvicorn process on 127.0.0.1:@PORT@.
#
# See docs/architecture/static-serving-and-deployment.md § Request routing.

<VirtualHost *:80>
    ServerName @INSTANCE@.@DOMAIN@
    DocumentRoot /var/www/energetica-@INSTANCE@

    # ACME http-01 challenges (certbot --webroot -w /var/www/energetica-@INSTANCE@) must be
    # served over plain HTTP and never redirected, or certificate issuance/renewal breaks.
    <Directory "/var/www/energetica-@INSTANCE@/.well-known/acme-challenge">
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName @INSTANCE@.@DOMAIN@

    # DocumentRoot is the app bundle so the SPA fallback below resolves index.html.
    DocumentRoot /var/www/energetica-@INSTANCE@/energetica/static/app

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/@INSTANCE@.@DOMAIN@/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/@INSTANCE@.@DOMAIN@/privkey.pem
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    # --- Static content served directly by Apache ---------------------------------
    # Explicit aliases (not DocumentRoot path math) so each public path maps to the
    # right directory regardless of DocumentRoot.
    Alias /static/app    /var/www/energetica-@INSTANCE@/energetica/static/app
    Alias /static/images /var/www/energetica-@INSTANCE@/energetica/static/images
    Alias /static/data   /var/www/energetica-@INSTANCE@/energetica/static/data
    Alias /service-worker.js /var/www/energetica-@INSTANCE@/energetica/static/service-worker.js
    # PWA requirement: manifest must be reachable at the root path. It ships inside
    # the app bundle and is per-instance (may later carry instance-specific metadata).
    Alias /manifest.json /var/www/energetica-@INSTANCE@/energetica/static/app/manifest.json

    <Directory "/var/www/energetica-@INSTANCE@/energetica/static">
        Require all granted
        Options -Indexes
    </Directory>

    # --- Dynamic traffic proxied to uvicorn ---------------------------------------
    ProxyPreserveHost On
    ProxyTimeout 300

    # WebSocket upgrade for Socket.IO. Must precede the plain /socket.io ProxyPass so
    # upgrade requests are tunnelled (mod_rewrite [P]) rather than proxied as HTTP.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/socket\.io/(.*)$ ws://127.0.0.1:@PORT@/socket.io/$1 [P,L]

    ProxyPass        /socket.io/ http://127.0.0.1:@PORT@/socket.io/
    ProxyPassReverse /socket.io/ http://127.0.0.1:@PORT@/socket.io/
    ProxyPass        /api        http://127.0.0.1:@PORT@/api
    ProxyPassReverse /api        http://127.0.0.1:@PORT@/api
    ProxyPass        /logout     http://127.0.0.1:@PORT@/logout
    ProxyPassReverse /logout     http://127.0.0.1:@PORT@/logout
    # /healthz is mounted at the uvicorn root (no /api/v1 prefix), so it needs its own rule.
    # deploy-instance.sh polls https://{fqdn}/healthz after a restart; without this it 404s.
    ProxyPass        /healthz    http://127.0.0.1:@PORT@/healthz
    ProxyPassReverse /healthz    http://127.0.0.1:@PORT@/healthz

    # --- SPA routing --------------------------------------------------------------
    # Bare root → the React client router (which lives under /app/).
    RedirectMatch ^/$ /app/
    # Sign-up moved under /app in RFC Phase 1. This redirect is an instance-local
    # convenience so {instance}.{domain}/sign-up still reaches the form. It does
    # NOT cover the legacy bookmarks from the pre-cutover single app, which pointed
    # at the apex ({domain}/sign-up) — the apex is now the pure-static landing
    # vhost, and redirecting it would have to pick a target instance. That
    # apex-side stale-link handling is deferred to the instance-picker work (#810).
    RedirectMatch ^/sign-up/?$ /app/sign-up
    # SPA fallback scoped to /app/* ONLY: an /app/... path with no backing file serves the
    # app shell and the client router takes over. Scoping it here (rather than a vhost-wide
    # FallbackResource) means a *missing* hashed asset under /static/ returns a clean 404
    # instead of index.html-with-200 — which a browser would try to execute as JS/CSS and
    # fail on — and a stray /.well-known 404 on :443 is likewise not masked. Real static
    # files are served directly; the proxied prefixes above are matched before this.
    <LocationMatch "^/app(/|$)">
        FallbackResource /static/app/index.html
    </LocationMatch>

    ErrorLog ${APACHE_LOG_DIR}/energetica-@INSTANCE@-error.log
    CustomLog ${APACHE_LOG_DIR}/energetica-@INSTANCE@-access.log combined
</VirtualHost>
