# Apache vhost for the apex landing site: @DOMAIN@
#
# Rendered by scripts/infra/setup-landing.sh, which substitutes the @DOMAIN@ placeholder.
# ${APACHE_LOG_DIR} is a literal Apache runtime variable — do NOT substitute it.
#
# The apex is pure static: it hosts NO game backend. The instance picker data
# (instances.json + instances/{slug}.json) is written to this DocumentRoot by the
# per-instance backends; Apache only serves it. See
# docs/architecture/static-serving-and-deployment.md § Request routing (landing).

<VirtualHost *:80>
    ServerName @DOMAIN@
    DocumentRoot /var/www/energetica-landing

    # ACME http-01 challenges (certbot --webroot -w /var/www/energetica-landing).
    <Directory "/var/www/energetica-landing/.well-known/acme-challenge">
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName @DOMAIN@

    # Vite builds the landing bundle with base "/", so assets resolve directly under
    # DocumentRoot (/assets/index-abc123.js). No alias needed.
    DocumentRoot /var/www/energetica-landing

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/@DOMAIN@/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/@DOMAIN@/privkey.pem
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    <Directory "/var/www/energetica-landing">
        Require all granted
        Options -Indexes
    </Directory>

    # The instance manifest changes whenever an admin edits an instance.json (picked up on
    # the instance's next login/restart). A short TTL lets edits propagate within a minute
    # without explicit cache-busting. The per-instance fragments under instances/ are
    # immutable-ish but cheap, so they share the same policy.
    <LocationMatch "^/instances(\.json|/.*\.json)$">
        Header set Cache-Control "max-age=60"
    </LocationMatch>

    # SPA routing for /landing-page, /about, /for-educators, /wiki/*, /changelog.
    # Real files (assets, instances.json) are served before the fallback fires.
    FallbackResource /index.html

    ErrorLog ${APACHE_LOG_DIR}/energetica-landing-error.log
    CustomLog ${APACHE_LOG_DIR}/energetica-landing-access.log combined
</VirtualHost>
