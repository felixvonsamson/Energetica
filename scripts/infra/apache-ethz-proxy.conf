# Reverse-proxy config for the ETHZ single-origin mirror: energetica.ethz.ch
#
# ── What this is ──────────────────────────────────────────────────────────────
# Some players sit behind a VPN that can reach `energetica.ethz.ch` but NOT
# `*.energetica-game.org`. `energetica.ethz.ch` is a vanity alias on ETHZ's
# shared central web-hosting platform: we control its Apache include
# (`~/conf/httpd.conf`) but not the DNS zone, so we cannot create subdomains
# (`lobby.`, `{slug}.`) under it. This config makes the one hostname we have
# reverse-proxy the game — the lobby (login/signup) AND exactly ONE live game
# instance — onto a single origin.
#
# The frontend cooperates: bundles served under this host detect it
# (`frontend/src/lib/single-origin.ts` → SINGLE_ORIGIN_HOSTS) and emit
# same-origin links instead of `lobby.{apex}` / `{slug}.{apex}`, and collapse
# the multi-run chooser (there is one reachable run). See the amendment in
# `docs/adr/0002-server-wide-sso-shared-cookie.md`.
#
# ── How to install ────────────────────────────────────────────────────────────
# These are directives for the ETHZ-managed vhost context (paste into
# `~/conf/httpd.conf`); ETHZ terminates TLS and owns the <VirtualHost>/ServerName,
# so there is deliberately no <VirtualHost> or SSL* cert block here. Requires the
# Apache modules: proxy, proxy_http, proxy_wstunnel, rewrite, headers, ssl
# (for SSLProxyEngine). Confirm they are loaded on the shared host before relying
# on this (`apachectl -M | grep -E 'proxy|rewrite|headers|ssl'`).
#
# ── Access posture (why there is deliberately no `Require` restriction) ────────
# This config intentionally adds no `Require`/IP allowlist. That is safe, not an
# oversight: the endpoints proxied here — the lobby (login/signup) and the game
# instance — are ALREADY globally public on energetica-game.org (a public web
# game with toggle-gated open signup, ADR-0003). `energetica.ethz.ch` is ETHZ
# *public* shared hosting, not a private network; the VPN in "VPN-blocked
# players" is the users' own egress filter, never a wall around this host. So the
# mirror is a second PUBLIC path to an already-public surface, not a new
# privileged entry point, and it does not rely on any network boundary for
# security. Specifically:
#   • Not an open forward proxy — every ProxyPass target below is a FIXED
#     upstream URL, so this cannot be coerced into reaching arbitrary hosts.
#   • Private/unadvertised runs stay gated at the instance ENTRY GATE
#     (`_enforce_instance_access`, ADR-0003), enforced on the backend regardless
#     of which path a request arrives on — the proxy cannot bypass it.
#   • It exposes nothing an attacker couldn't already reach at energetica-game.org.
# If you ever want to narrow this second surface to the intended cohort (optional
# hardening, NOT a fix for a hole), wrap the rules in `<Location "/"> Require ip
# <range> </Location>` once their egress range is known — but a wrong range locks
# out the very VPN-blocked users this exists for, so confirm it first.
#
# ── Per-season rollover ───────────────────────────────────────────────────────
# Instances rotate each season. To repoint at the new live instance, change the
# instance host EVERYWHERE below — it appears as `hertz.energetica-game.org` (a
# find-and-replace on that string). NOTHING ELSE changes: no DNS ticket, no cert,
# no frontend rebuild. The lobby host (`lobby.energetica-game.org`) is stable.

# --- Prerequisites for proxying to an HTTPS upstream --------------------------
SSLProxyEngine On
# Send the UPSTREAM's Host (lobby./{slug}.energetica-game.org), not
# energetica.ethz.ch, so each remote Apache matches its own vhost. Must be Off.
ProxyPreserveHost Off
ProxyTimeout 300

# Re-home the SSO cookie. The lobby mints `energetica_session` with
# `Domain=.energetica-game.org`; a browser on energetica.ethz.ch would reject it
# (different registrable domain), so rewrite the attribute to this host. One
# directive covers every proxied Set-Cookie.
ProxyPassReverseCookieDomain .energetica-game.org energetica.ethz.ch

RewriteEngine On

# --- WebSocket (Socket.IO) upgrade → the instance -----------------------------
# Must precede the plain /socket.io ProxyPass so upgrade requests are tunnelled
# (mod_rewrite [P]) rather than proxied as plain HTTP. wss:// because the upstream
# is HTTPS. (The stale prior config pointed at ws://…:5002 — a dead local port.)
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteRule ^/socket\.io/(.*)$ wss://hertz.energetica-game.org/socket.io/$1 [P,L]

# --- /api dispatch: lobby vs instance -----------------------------------------
# The two backends share the /api/v1 namespace; ORDER matters (first match wins,
# so the more specific rules come first):
#   • /api/v1/auth/me           → instance  (the entry gate — must beat /auth below)
#   • /api/v1/auth/*            → lobby     (login, signup, logout, change-password)
#   • /api/v1/lobby/*          → lobby     (my-runs; both backends implement it
#                                            identically, so either target is fine)
#   • everything else /api/*   → instance  (the game API)
ProxyPass        /api/v1/auth/me   https://hertz.energetica-game.org/api/v1/auth/me
ProxyPassReverse /api/v1/auth/me   https://hertz.energetica-game.org/api/v1/auth/me

ProxyPass        /api/v1/auth      https://lobby.energetica-game.org/api/v1/auth
ProxyPassReverse /api/v1/auth      https://lobby.energetica-game.org/api/v1/auth

ProxyPass        /api/v1/lobby     https://lobby.energetica-game.org/api/v1/lobby
ProxyPassReverse /api/v1/lobby     https://lobby.energetica-game.org/api/v1/lobby

ProxyPass        /api              https://hertz.energetica-game.org/api
ProxyPassReverse /api              https://hertz.energetica-game.org/api

# --- Instance static + dynamic (the game app bundle) --------------------------
# The app bundle is built with base /static/app/, so its assets live under
# /static/*; the SPA shell is under /app. Service worker (root-scoped) and the
# PWA manifest are the game's.
ProxyPass        /socket.io/       https://hertz.energetica-game.org/socket.io/
ProxyPassReverse /socket.io/       https://hertz.energetica-game.org/socket.io/

ProxyPass        /app              https://hertz.energetica-game.org/app
ProxyPassReverse /app              https://hertz.energetica-game.org/app

ProxyPass        /static           https://hertz.energetica-game.org/static
ProxyPassReverse /static           https://hertz.energetica-game.org/static

ProxyPass        /service-worker.js https://hertz.energetica-game.org/service-worker.js
ProxyPassReverse /service-worker.js https://hertz.energetica-game.org/service-worker.js

ProxyPass        /manifest.json    https://hertz.energetica-game.org/manifest.json
ProxyPassReverse /manifest.json    https://hertz.energetica-game.org/manifest.json

ProxyPass        /healthz          https://hertz.energetica-game.org/healthz
ProxyPassReverse /healthz          https://hertz.energetica-game.org/healthz

# --- Lobby SPA (login/signup/picker) + its assets + the catch-all -------------
# The picker fetches /instances.json same-origin; the lobby vhost Aliases it from
# the shared landing dir. Route it to the lobby upstream.
ProxyPass        /instances.json   https://lobby.energetica-game.org/instances.json
ProxyPassReverse /instances.json   https://lobby.energetica-game.org/instances.json

# Everything not matched above (/, /login, /signup, /logout, /assets/*, and the
# lobby's client-side routes via its FallbackResource) is the lobby SPA. MUST be
# last — "/" matches every path.
ProxyPass        /                 https://lobby.energetica-game.org/
ProxyPassReverse /                 https://lobby.energetica-game.org/
